---
name: Bump Addon Version

on:
  workflow_dispatch:
    inputs:
      addon:
        description: 'Addon to bump'
        required: true
        type: choice
        options:
          - music_assistant_beta
          - omniroute
      version:
        description: 'Version to bump to (e.g., 2.10.0b3 or 3.8.47)'
        required: true
        type: string

jobs:
  bump-version:
    name: Update ${{ matrix.name }} addon version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        include:
          - addon: music_assistant_beta
            name: Music Assistant
            config_path: music_assistant_beta/config.yaml
            dockerfile_path: music_assistant_beta/Dockerfile
            image_pattern: "FROM ghcr.io/music-assistant/server:.*"
          - addon: omniroute
            name: OmniRoute
            config_path: omniroute/config.yaml
            dockerfile_path: omniroute/Dockerfile
            image_pattern: "FROM diegosouzapw/omniroute:v.*"
      fail-fast: false
    steps:
      - uses: actions/checkout@v5

      - name: Update version files
        if: inputs.addon == matrix.addon
        run: |
          VERSION="${{ inputs.version }}"
          IMAGE_NAME=$(echo "${{ matrix.image_pattern }}" | sed 's/FROM //;s/:.*//')

          sed -i "s/^version: .*/version: ${VERSION}/" ${{ matrix.config_path }}
          sed -i "s|${{ matrix.image_pattern }}|FROM ${IMAGE_NAME}:${VERSION}|" ${{ matrix.dockerfile_path }}

      - name: Create Pull Request
        if: inputs.addon == matrix.addon
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Bump ${{ matrix.name }} version to ${{ inputs.version }}"
          branch: bump-${{ matrix.addon }}-${{ inputs.version }}
          delete-branch: true
          title: "Bump ${{ matrix.name }} version to ${{ inputs.version }}"
          body: |
            Automated version bump to ${{ inputs.version }}

            Updated files:
            - `${{ matrix.config_path }}`
            - `${{ matrix.dockerfile_path }}`
