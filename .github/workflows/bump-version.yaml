---
name: Bump Addon Version

on:
  workflow_dispatch:
    inputs:
      addon:
        description: 'Addon to bump (music_assistant or omniroute)'
        required: true
        type: choice
        options:
          - music_assistant
          - omniroute
      version:
        description: 'Version to bump to (e.g., 2.10.0b3 or 3.8.46)'
        required: true
        type: string

jobs:
  bump-version:
    name: Update addon version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      
      - name: Update Music Assistant version
        if: inputs.addon == 'music_assistant'
        run: |
          VERSION="${{ inputs.version }}"
          
          sed -i "s/^version: .*/version: ${VERSION}/" music_assistant_beta/config.yaml
          
          sed -i "s|FROM ghcr.io/music-assistant/server:.*|FROM ghcr.io/music-assistant/server:${VERSION}|" music_assistant_beta/Dockerfile
          
          sed -i "s|ghcr.io/\${{ github.repository_owner }}/mass-server:.*|ghcr.io/\${{ github.repository_owner }}/mass-server:${VERSION}|" .github/workflows/release.yaml
      
      - name: Update OmniRoute version
        if: inputs.addon == 'omniroute'
        run: |
          VERSION="${{ inputs.version }}"
          
          sed -i "s/^version: .*/version: ${VERSION}/" omniroute/config.yaml
          
          sed -i "s|FROM diegosouzapw/omniroute:v.*|FROM diegosouzapw/omniroute:v${VERSION}|" omniroute/Dockerfile
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Bump ${{ inputs.addon }} version to ${{ inputs.version }}"
          branch: bump-${{ inputs.addon }}-${{ inputs.version }}
          delete-branch: true
          title: "Bump ${{ inputs.addon }} version to ${{ inputs.version }}"
          body: |
            Automated version bump for **${{ inputs.addon }}** to `${{ inputs.version }}`
            
            Updated files:
            ${{ inputs.addon == 'music_assistant' && '- `music_assistant_beta/config.yaml`\n- `music_assistant_beta/Dockerfile`\n- `.github/workflows/release.yaml`' || '- `omniroute/config.yaml`\n- `omniroute/Dockerfile`' }}
